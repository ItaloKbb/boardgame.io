<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - boardgame.io</title>
    <meta name="description" content="A fun memory card matching game built with boardgame.io">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        .game-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .stats p {
            font-size: 18px;
            color: #666;
            font-weight: 500;
        }

        .status {
            color: #667eea !important;
            font-weight: 600 !important;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 0 auto;
            max-width: 500px;
        }

        @media (max-width: 600px) {
            .cards-grid {
                gap: 10px;
            }
        }

        .card {
            aspect-ratio: 1;
            cursor: pointer;
            perspective: 1000px;
        }

        .card.matched {
            cursor: default;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 50px;
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .card.matched .card-back {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            animation: pulse 0.5s;
        }

        .card:hover:not(.matched):not(.flipped) .card-inner {
            transform: scale(1.05);
        }

        @keyframes pulse {
            0%, 100% {
                transform: rotateY(180deg) scale(1);
            }
            50% {
                transform: rotateY(180deg) scale(1.1);
            }
        }

        .winner {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            text-align: center;
            animation: fadeIn 0.5s;
        }

        .winner h3 {
            margin: 0 0 10px 0;
            font-size: 28px;
        }

        .winner p {
            margin: 0 0 15px 0;
            font-size: 18px;
        }

        .reset-button {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .reset-button:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: white;
            opacity: 0.8;
        }

        .footer a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 Memory Game</h1>
        <p>Match all the pairs to win!</p>
    </div>

    <div class="game-container">
        <div class="game-info">
            <h2>Find the Matching Pairs</h2>
            <div class="stats">
                <p>Attempts: <span id="attempts">0</span></p>
                <p>Matches: <span id="matches">0</span> / 8</p>
            </div>
            <p class="status" id="status">Click cards to flip them</p>
        </div>

        <div class="cards-grid" id="cardsGrid"></div>

        <div class="winner" id="winner" style="display: none;">
            <h3>🎉 Congratulations!</h3>
            <p>You completed the game in <span id="finalAttempts">0</span> attempts!</p>
            <button class="reset-button" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <div class="footer">
        <p>Built with ❤️ using <a href="https://boardgame.io" target="_blank">boardgame.io</a></p>
        <p>View on <a href="https://github.com/ItaloKbb/boardgame.io" target="_blank">GitHub</a></p>
    </div>

    <script>
        // Game state
        let gameState = {
            cards: [],
            flipped: [],
            matched: [],
            attempts: 0,
            isChecking: false
        };

        // Card symbols (8 pairs)
        const symbols = ['🎮', '🎯', '🎨', '🎭', '🎪', '🎸', '🎹', '🎬'];

        // Create and shuffle deck
        function createDeck() {
            const deck = [];
            symbols.forEach((symbol, index) => {
                deck.push({ id: index * 2, symbol });
                deck.push({ id: index * 2 + 1, symbol });
            });
            return shuffleArray(deck);
        }

        // Shuffle array
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Initialize game
        function initGame() {
            gameState = {
                cards: createDeck(),
                flipped: [],
                matched: [],
                attempts: 0,
                isChecking: false
            };
            renderGame();
        }

        // Render game
        function renderGame() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';

            gameState.cards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';

                if (gameState.flipped.includes(index)) {
                    cardElement.classList.add('flipped');
                }

                if (gameState.matched.includes(index)) {
                    cardElement.classList.add('matched', 'flipped');
                }

                cardElement.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${card.symbol}</div>
                    </div>
                `;

                cardElement.addEventListener('click', () => flipCard(index));
                grid.appendChild(cardElement);
            });

            // Update stats
            document.getElementById('attempts').textContent = gameState.attempts;
            document.getElementById('matches').textContent = gameState.matched.length / 2;

            // Update status
            if (gameState.isChecking) {
                document.getElementById('status').textContent = 'Checking...';
            } else if (gameState.matched.length === gameState.cards.length) {
                document.getElementById('status').textContent = 'Game Complete!';
                showWinner();
            } else {
                document.getElementById('status').textContent = 'Click cards to flip them';
            }
        }

        // Flip card
        function flipCard(index) {
            // Prevent flipping if checking, already flipped, or matched
            if (gameState.isChecking ||
                gameState.flipped.includes(index) ||
                gameState.matched.includes(index) ||
                gameState.flipped.length >= 2) {
                return;
            }

            // Add to flipped
            gameState.flipped.push(index);
            renderGame();

            // Check if two cards are flipped
            if (gameState.flipped.length === 2) {
                gameState.attempts++;
                gameState.isChecking = true;
                renderGame();

                const [index1, index2] = gameState.flipped;
                const card1 = gameState.cards[index1];
                const card2 = gameState.cards[index2];

                // Check if they match
                setTimeout(() => {
                    if (card1.symbol === card2.symbol) {
                        // Match found
                        gameState.matched.push(index1, index2);
                    }

                    // Reset flipped
                    gameState.flipped = [];
                    gameState.isChecking = false;
                    renderGame();
                }, 1000);
            }
        }

        // Show winner
        function showWinner() {
            document.getElementById('finalAttempts').textContent = gameState.attempts;
            document.getElementById('winner').style.display = 'block';
        }

        // Reset game
        function resetGame() {
            document.getElementById('winner').style.display = 'none';
            initGame();
        }

        // Start game on load
        initGame();
    </script>
</body>
</html>
